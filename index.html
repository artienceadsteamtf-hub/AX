<style>
:root{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}

.wrap{max-width:760px;margin:0 auto;padding:26px 18px 90px}

function tierQs(t){return PT.questions.filter(q=>q.tier===t);}
function renderSteps(){
 $('steps').innerHTML=[1,2,3].map(t=>{let c='';if(tierStat[t])c=tierStat[t].pass?'done':'fail';else if(t===curTier&&started)c='cur';const s=tierStat[t]?`${tierStat[t].pct}%`:(t<curTier?'':'');return `<div class="step ${c}">${TLAB[t]} ${tierQs(t).length}문<small>${tierStat[t]?(tierStat[t].pass?'통과 '+tierStat[t].pct+'%':'미통과 '+tierStat[t].pct+'%'):(t===curTier&&started?'진행 중':'대기')}</small></div>`;}).join('');
}
function renderTier(t){
 curTier=t; renderSteps();
 const qs=tierQs(t); let html='';
 if(t===1){html+=`<div class="card"><div class="namerow"><label>이름</label><select id="stuName"><option value="">─ 명단에서 선택 ─</option>${(PT.roster||[]).map(n=>`<option>${esc(n)}</option>`).join('')}<option value="__other">기타(목록에 없음)</option></select><input id="stuNameOther" placeholder="이름 직접 입력" style="display:none"></div><div class="namehint">정확한 결과 매칭을 위해 본인 이름을 명단에서 선택해 주세요. 명단에 없으면 ‘기타’를 선택해 직접 입력합니다.</div></div>`;}
 qs.forEach((q,i)=>{
  let body;
  if(q.type==='fill'){body=`<div class="fillin"><input data-qid="${q.id}" class="fillinput" placeholder="명령어 입력 (예: add)" value="${esc((answers[q.id]||{}).val||'')}"></div>`;}
  else{const opts=q.options.concat([UNSURE]);body='<div class="opts">'+opts.map((o,oi)=>`<div class="opt${oi===q.options.length?' unsure':''}${(answers[q.id]&&answers[q.id].val===oi)?' sel':''}" data-qid="${q.id}" data-oi="${oi}"><span class="dot"></span>${esc(o)}</div>`).join('')+'</div>';}
  html+=`<div class="card"><div class="qhead"><span class="qnum">${TLAB[t]} ${i+1}</span><span class="qmeta">${esc(q.area)}</span></div><div class="qtext">${esc(q.q)}</div>${body}</div>`;
 });
 html+=`<div class="submitbar"><span class="prog" id="prog"></span><button class="bigbtn" id="submitBtn">${t<3?TLAB[t]+' 단계 제출':'마지막 단계 제출'}</button></div>`;
 $('quiz').innerHTML=html; $('quiz').classList.remove('hidden'); window.scrollTo(0,0);
 $('quiz').querySelectorAll('.opt').forEach(el=>el.addEventListener('click',()=>{const qid=el.getAttribute('data-qid'),oi=+el.getAttribute('data-oi');el.parentNode.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');answers[qid]={type:'mc',val:oi};prog();}));
 $('quiz').querySelectorAll('.fillinput').forEach(el=>el.addEventListener('input',()=>{answers[el.getAttribute('data-qid')]={type:'fill',val:el.value};prog();}));
 $('submitBtn').addEventListener('click',()=>submitTier(t)); const _sel=$('stuName'); if(_sel)_sel.addEventListener('change',()=>{const o=$('stuNameOther'); if(o)o.style.display=(_sel.value==='__other')?'block':'none'; if(_sel.value==='__other'&&o)o.focus();}); prog();
}
function prog(){const qs=tierQs(curTier);const n=qs.filter(q=>{const a=answers[q.id];return a&&(a.type==='mc'||(a.val||'').trim());}).length;if($('prog'))$('prog').textContent=`${n} / ${qs.length} 응답`;}
function norm(s){return String(s||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/[`'".]/g,'');}
function fillOk(q,val){const v=norm(val);return (q.accept||[]).some(a=>{const na=norm(a);return v===na||('git '+v)===na||('codex '+v)===na||v===na.replace(/^git |^codex /,'');});}
function gradeTier(t){const qs=tierQs(t);let c=0,uns=0;qs.forEach(q=>{const a=answers[q.id];let ok=false;if(q.type==='fill')ok=a&&fillOk(q,a.val);else{if(a&&a.val===q.options.length)uns++;ok=a&&a.val===q.answer;}if(ok)c++;});return {c,t:qs.length,pct:Math.round(c/qs.length*100),uns};}
function submitTier(t){
 if(t===1){let nm=($('stuName').value||'').trim();if(nm==='__other')nm=(($('stuNameOther')||{}).value||'').trim();if(!nm){alert('명단에서 이름을 선택해주세요');window.scrollTo(0,0);return;}window._name=nm;}
 const r=gradeTier(t); tierStat[t]={pct:r.pct,pass:r.pct>=PASS,c:r.c,t:r.t,uns:r.uns}; renderSteps();
 showReview(t);
}
function showReview(t){
 const qs=tierQs(t); const st=tierStat[t];
 const wrong=qs.filter(q=>!(answers[q.id]&&answers[q.id].val===q.answer));
 let html=`<div class="card" style="text-align:center"><div class="gate"><div class="gp" style="color:${st.pass?'#16a34a':'#dc2626'}">${TLAB[t]} ${st.pct}%</div><div class="gl">${st.c}/${st.t} 정답 · ${st.pass?'통과 — 다음 단계로 진행':'미통과 — 여기서 종료'}</div></div></div>`;
 if(wrong.length){
   html+=`<div class="card"><h2>✍️ ${TLAB[t]} 단계 틀린 문제 정답 확인 (${wrong.length}문)</h2>`+wrong.map(q=>{
     const my=answers[q.id]; const myTxt=(my&&my.val<q.options.length)?esc(q.options[my.val]):((my&&my.val===q.options.length)?'잘 모르겠음':'무응답');
     return `<div class="rev"><div class="rq">${esc(q.q)}</div><div class="rwrong">✗ 내 답: ${myTxt}</div><div class="rright">✓ 정답: ${esc(q.options[q.answer])}</div><div class="rexp">${esc(q.explain)}</div></div>`;
   }).join('')+`</div>`;
 } else { html+=`<div class="card" style="text-align:center;color:#16a34a;font-weight:800;font-size:15px">${TLAB[t]} 단계 전부 정답! 🎉</div>`; }
 const last=(t>=3)||!st.pass;
 html+=`<div class="submitbar"><span class="prog">${st.pass&&!last?'70% 이상 — 다음 단계가 열렸습니다':''}</span><button class="bigbtn" id="nextBtn">${last?'결과 보기 ▶':TLAB[t+1]+' 단계로 ▶'}</button></div>`;
 $('quiz').innerHTML=html; window.scrollTo(0,0);
 $('nextBtn').addEventListener('click',()=>{ if(last)finalize(); else renderTier(t+1); });
}
function finalize(){
 // final score (banded)
 const p1=tierStat[1]?tierStat[1].pct:0, p2=tierStat[2]?tierStat[2].pct:0, p3=tierStat[3]?tierStat[3].pct:0;
 let final, reached=Math.max(...Object.keys(tierStat).map(Number));
 if(!tierStat[1] || !tierStat[1].pass){final=p1*0.4;}
 else if(!tierStat[2] || !tierStat[2].pass){final=40+p2*0.3;}
 else if(!tierStat[3] || !tierStat[3].pass){final=70+p3*0.2;}
 else {final=90+(p3-70)/30*10;}
 final=Math.round(Math.max(0,Math.min(100,final)));
 // aggregate attempted
 const areas=PT.areas; const byArea={}; areas.forEach(a=>byArea[a]={c:0,t:0});
 const byLevel={}; let correct=0,total=0,unsure=0;
 [1,2,3].forEach(t=>{ if(!tierStat[t])return; const qs=tierQs(t); byLevel[t]={c:tierStat[t].c,t:tierStat[t].t};
  qs.forEach(q=>{const a=answers[q.id];let ok=false;if(q.type==='fill')ok=a&&fillOk(q,a.val);else{if(a&&a.val===q.options.length)unsure++;ok=a&&a.val===q.answer;}byArea[q.area].t++;total++;if(ok){byArea[q.area].c++;correct++;}});});
 const byAreaPct={}; areas.forEach(a=>{byAreaPct[a]={c:byArea[a].c,t:byArea[a].t,pct:byArea[a].t?Math.round(byArea[a].c/byArea[a].t*100):null};});
 const weak=areas.filter(a=>byAreaPct[a].pct!=null && byAreaPct[a].pct<60);
 const result={v:2,name:window._name,takenAt:new Date().toISOString(),score:final,correct,total,unsure,reachedTier:reached,
   tierPct:{1:tierStat[1]?tierStat[1].pct:null,2:tierStat[2]?tierStat[2].pct:null,3:tierStat[3]?tierStat[3].pct:null},
   pass:{1:!!(tierStat[1]&&tierStat[1].pass),2:!!(tierStat[2]&&tierStat[2].pass),3:!!(tierStat[3]&&tierStat[3].pass)},
   byArea:byAreaPct, byLevel, weak};
 renderResult(result);
}
function b64(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o))));}
function renderResult(r){
 $('quiz').classList.add('hidden'); renderSteps();
 const gColor=r.score>=90?'#16a34a':r.score>=70?'#2563eb':r.score>=40?'#d97706':'#dc2626';
 const reachedLabel=r.pass[3]?'고급 통과 (최상위)':r.pass[2]?'고급 단계 도달':r.pass[1]?'중급 단계 도달':'기초 단계';
 const tierLine=[1,2,3].map(t=>r.tierPct[t]!=null?`${TLAB[t]} ${r.tierPct[t]}%${r.pass[t]?'✓':''}`:`${TLAB[t]} —`).join(' · ');
 let areas=''; PT.areas.forEach(a=>{const x=r.byArea[a];if(x.pct==null)return;const col=x.pct>=60?'#3b82f6':'#f59e0b';areas+=`<div class="arearow"><span class="an">${esc(a)}</span><div class="bar"><span style="width:${x.pct}%;background:${col}"></span></div><span style="text-align:right;font-weight:700">${x.pct}%</span></div>`;});
 const code=b64(r);
 $('result').classList.remove('hidden');
 $('result').innerHTML=`
  <div class="card" style="text-align:center"><div class="score" style="color:${gColor}">${r.score}점</div>
   <div class="scorelab"><b>${reachedLabel}</b> · ${tierLine}${r.unsure?` · '잘 모르겠음' ${r.unsure}개`:''}</div></div>
  <div class="card"><h2>영역별 이해도 (응시 범위)</h2>${areas||'<div style="color:#94a3b8">집계 없음</div>'}
   ${r.weak.length?`<div class="note"><b>보강 필요 영역</b>: ${r.weak.map(esc).join(', ')}</div>`:`<div class="note" style="background:#ecfdf5;border-color:#a7f3d0;color:#047857"><b>응시 범위 내 양호</b></div>`}</div>
  <div class="card"><div id="submitState" style="font-size:14px;font-weight:700;color:#16a34a;margin-bottom:6px"></div><div id="codeBackup"><h2>📋 결과 코드 ${submitConfigured()?'(자동 제출 백업용 — 자동 전송되면 안 보내셔도 됩니다)':'— 교육 담당자에게 전달'}</h2>
   <p style="font-size:12.5px;color:#64748b;margin-bottom:8px">아래 코드를 복사해 교육 담당자에게 보내주세요. (정답·해설은 교육 후 공개)</p>
   <textarea class="codebox" rows="4" id="codeOut" readonly>${code}</textarea>
   <div style="margin-top:10px"><button class="bigbtn" id="copyBtn" style="font-size:13px;padding:10px 20px">결과 코드 복사</button> <span id="copyStat" style="font-size:12px;color:#16a34a;margin-left:8px"></span></div></div></div>`;
 window.scrollTo(0,0);
 trySubmit(code);
 $('copyBtn').addEventListener('click',()=>{const ta=$('codeOut');ta.select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard)navigator.clipboard.writeText(ta.value).catch(()=>{});$('copyStat').textContent='✅ 복사됨';});
}
started=true; renderTier(1);
</script></body></html>
